# MCP servers (synchronized from .vscode/mcp.json)

[servers.next-devtools]
command = "npx"
args = ["-y", "next-devtools-mcp@latest"]

[servers."@magicuidesign/mcp"]
command = "npx"
args = ["-y", "@magicuidesign/mcp@latest"]

[servers.shadcn]
command = "npx"
args = ["shadcn@latest", "mcp"]

[servers.mastra]
type = "stdio"
command = "npx"
args = ["-y", "@mastra/mcp-docs-server@latest"]

